<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Wolfe | Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Core Theme Colors */
            --theme-red: #ff0033;
            --theme-red-glow: rgba(255, 0, 51, 0.6);
            --bg-color: #050000;
            --card-bg: rgba(12, 3, 3, 0.65);
            --text-main: #f0f0f0;
            --text-muted: #a07a7a;
            
            /* Social Colors */
            --tiktok-color: #00f2fe;
            --ig-color: #E1306C;
            --discord-color: #5865F2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 1. Dynamic Background Image */
        body::before {
            content: '';
            position: fixed;
            top: -5%; 
            left: -5%;
            width: 110%; 
            height: 110%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(12px) brightness(0.4); /* Darkened and blurred */
            z-index: -2;
            animation: slowPan 30s linear infinite alternate; /* Subtle background movement */
        }

        /* 2. CRT Scanline Grid Overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 0, 51, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 51, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        /* Subtle background panning animation */
        @keyframes slowPan {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-20px, -20px); }
        }

        /* Main Profile Card */
        .container {
            background: var(--card-bg);
            border: 1px solid rgba(255, 0, 51, 0.3);
            border-radius: 16px;
            padding: 45px 35px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 
                        0 0 20px rgba(255, 0, 51, 0.15), 
                        inset 0 0 20px rgba(255, 0, 51, 0.05);
            position: relative;
            backdrop-filter: blur(15px); /* Premium Glassmorphism */
            -webkit-backdrop-filter: blur(15px);
            z-index: 1;
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top Cyberpunk Accents */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 4px;
            background: var(--theme-red);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 0 15px var(--theme-red-glow);
        }

        /* Avatar Container & Status Dot */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top;
            border: 3px solid #1a0505;
            box-shadow: 0 0 0 3px var(--theme-red), 
                        0 0 25px var(--theme-red-glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: contrast(1.1);
        }

        .profile-pic:hover {
            transform: scale(1.08) rotate(2deg);
            box-shadow: 0 0 0 3px var(--text-main), 
                        0 0 35px var(--theme-red-glow);
        }

        .status-dot {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background-color: var(--theme-red);
            border-radius: 50%;
            border: 3px solid var(--bg-color);
            box-shadow: 0 0 10px var(--theme-red);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 51, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 51, 0); }
        }

        /* Typography */
        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 0 0 8px var(--theme-red-glow);
        }

        .bio-container {
            min-height: 20px;
            margin-bottom: 20px;
        }

        .bio {
            color: var(--theme-red);
            font-size: 0.95rem;
            font-weight: bold;
            border-right: 2px solid var(--theme-red);
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            margin: 0 auto;
            letter-spacing: 1px;
            width: 0;
            animation: typing 2.5s steps(30, end) 0.5s forwards, 
                       blink 0.8s step-end infinite;
        }

        @keyframes typing {
            to { width: 100%; }
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* Personal Identity Badges */
        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
            animation: fadeIn 1s ease 1s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .badge {
            background: rgba(255, 0, 51, 0.1);
            border: 1px solid rgba(255, 0, 51, 0.4);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Buttons Styling */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Spreads icon, text, and arrow */
            padding: 16px 25px;
            background: rgba(0, 0, 0, 0.4);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s ease forwards;
        }

        /* Staggered animation for buttons */
        .link-btn:nth-child(1) { animation-delay: 1.2s; }
        .link-btn:nth-child(2) { animation-delay: 1.4s; }
        .link-btn:nth-child(3) { animation-delay: 1.6s; }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Left Icon */
        .link-btn .btn-icon {
            font-size: 1.4rem;
            width: 30px;
            text-align: left;
            transition: all 0.3s ease;
        }

        /* Right Arrow */
        .link-btn .btn-arrow {
            font-size: 1rem;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        /* Button Hover Core Effect */
        .link-btn:hover {
            transform: translateY(-3px);
            background: rgba(20, 20, 20, 0.8);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .link-btn:hover .btn-arrow {
            opacity: 1;
            transform: translateX(5px);
        }

        /* TikTok Hover */
        .link-btn.tiktok:hover {
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.15), inset 0 0 15px rgba(0, 242, 254, 0.1);
            border-color: var(--tiktok-color);
        }
        .link-btn.tiktok:hover .btn-icon, .link-btn.tiktok:hover .btn-text { color: var(--tiktok-color); text-shadow: 0 0 8px var(--tiktok-color); }

        /* Instagram Hover */
        .link-btn.instagram:hover {
            box-shadow: 0 10px 20px rgba(225, 48, 108, 0.15), inset 0 0 15px rgba(225, 48, 108, 0.1);
            border-color: var(--ig-color);
        }
        .link-btn.instagram:hover .btn-icon, .link-btn.instagram:hover .btn-text { color: var(--ig-color); text-shadow: 0 0 8px var(--ig-color); }

        /* Discord Hover */
        .link-btn.discord:hover {
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.15), inset 0 0 15px rgba(88, 101, 242, 0.1);
            border-color: var(--discord-color);
        }
        .link-btn.discord:hover .btn-icon, .link-btn.discord:hover .btn-text { color: var(--discord-color); text-shadow: 0 0 8px var(--discord-color); }

        /* Custom Discord Copied Alert */
        .discord-alert {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--discord-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            transform: translateY(100%);
        }
        
        .discord-alert.active {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-wrapper">
            <img src="M3.jpg" alt="James Wolfe" class="profile-pic">
            <div class="status-dot"></div>
        </div>
        
        <h1>James Wolfe</h1>
        
        <div class="bio-container">
            <span class="bio">SYSTEM.ONLINE // TERMINAL_ACTIVE</span>
        </div>

        <div class="badges">
            <div class="badge"><i class="fa-solid fa-dumbbell"></i> LIFT</div>
            <div class="badge"><i class="fa-solid fa-gamepad"></i> GAME</div>
            <div class="badge"><i class="fa-solid fa-code"></i> CODE</div>
        </div>

        <div class="links-container">
            <a href="https://www.tiktok.com/@jetwolfe?is_from_webapp=1&sender_device=pc" target="_blank" class="link-btn tiktok">
                <i class="fa-brands fa-tiktok btn-icon"></i>
                <span class="btn-text">TikTok</span>
                <i class="fa-solid fa-chevron-right btn-arrow"></i>
            </a>

            <a href="https://www.instagram.com/jetwolfe/" target="_blank" class="link-btn instagram">
                <i class="fa-brands fa-instagram btn-icon"></i>
                <span class="btn-text">Instagram</span>
                <i class="fa-solid fa-chevron-right btn-arrow"></i>
            </a>

            <a href="#" class="link-btn discord" onclick="copyDiscord(event)">
                <i class="fa-brands fa-discord btn-icon"></i>
                <span class="btn-text" id="discord-text">Discord</span>
                <i class="fa-solid fa-chevron-right btn-arrow"></i>
                <div class="discord-alert" id="discord-alert">
                    <i class="fa-solid fa-check" style="margin-right: 8px;"></i> USERNAME COPIED
                </div>
            </a>
        </div>
    </div>

    <script>
        function copyDiscord(e) {
            e.preventDefault();
            const discordUsername = "jetwolfe";
            navigator.clipboard.writeText(discordUsername).then(() => {
                const alertBox = document.getElementById("discord-alert");
                
                // Trigger the slide-up copied alert
                alertBox.classList.add("active");
                
                // Hide it after 2 seconds
                setTimeout(() => {
                    alertBox.classList.remove("active");
                }, 2000);
            });
        }
    </script>
</body>
</html>
